<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; --blue: #00e5ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; overflow: hidden; }
        
        /* Profil Paneli */
        .profile-bar { width: 100%; max-width: 350px; background: var(--card); padding: 15px; border-radius: 15px; border: 2px solid #222; margin-bottom: 15px; box-shadow: 0 0 10px rgba(255, 140, 0, 0.1); }
        .id-label { font-size: 0.65rem; color: var(--orange); letter-spacing: 2px; font-weight: bold; margin-bottom: 5px; }
        .id-value { font-size: 1rem; color: #fff; font-weight: 900; font-family: monospace; margin-bottom: 10px; }
        .name-edit-area { display: flex; gap: 8px; }
        .name-input-mini { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; outline: none; }
        .btn-save-mini { background: var(--orange); color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: 900; font-size: 0.7rem; cursor: pointer; }

        .header { text-align: center; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 1.1rem; color: var(--orange); letter-spacing: 1.5px; font-weight: 900; }
        #msg { color: #fff; font-size: 0.8rem; min-height: 18px; margin: 5px 0; font-weight: bold; }

        .scoreboard { display: flex; gap: 8px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .card { flex: 1; background: var(--card); border: 2px solid #222; padding: 8px; border-radius: 12px; text-align: center; }
        .card.active { border-color: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .num { font-size: 1.6rem; color: var(--orange); font-weight: 900; }

        .mode-selection { display: flex; gap: 5px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .btn-main { flex: 1; padding: 12px 5px; font-size: 0.65rem; font-weight: 900; background: #000; border: 2px solid #333; border-radius: 8px; cursor: pointer; color: #fff; }
        .btn-main.active { border-color: var(--orange); background: var(--orange); color: #000; }

        .canvas-container { border: 3px solid #1a1a1a; border-radius: 15px; background: #000; }
        canvas { display: block; touch-action: none; border-radius: 12px; }

        /* Online Lobby Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: #000; border: 2px solid var(--orange); border-radius: 20px; padding: 25px; width: 280px; text-align: center; }
        .neon-input { background: #111; border: 1px solid var(--orange); color: white; padding: 12px; border-radius: 10px; width: 100%; margin: 15px 0; outline: none; text-align: center; box-sizing: border-box; }
        .btn-action { background: var(--orange); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="profile-bar">
        <div class="id-label">MY BARRICADE ID</div>
        <div class="id-value" id="display-my-id">---</div>
        <div class="name-edit-area">
            <input type="text" id="user-name-input" class="name-input-mini" placeholder="Yeni İsim..." maxlength="12">
            <button class="btn-save-mini" onclick="updateName()">SET</button>
        </div>
    </div>

    <div id="room-screen" class="modal-overlay">
        <div class="modal-box">
            <h1 style="color: var(--orange);">ONLINE LOBBY</h1>
            <input type="text" id="target-room-id" class="neon-input" placeholder="Rakip ID Giriniz">
            <button class="btn-action" onclick="joinOnlineRoom()">BAĞLAN VE BAŞLAT</button>
            <button class="btn-action" style="background:#222; color:#fff" onclick="toggleRoomModal(false)">GERİ DÖN</button>
        </div>
    </div>

    <div class="header">
        <h1>BARRICADE PLATINUM</h1>
        <div id="msg">SİSTEM ÇEVRİMİÇİ</div>
    </div>

    <div class="scoreboard">
        <div id="c0" class="card active">
            <small id="name-p1">PLAYER</small>
            <div class="num" id="w0">10</div>
        </div>
        <div id="c1" class="card">
            <small id="name-p2">RAKİP</small>
            <div class="num" id="w1">10</div>
        </div>
    </div>

    <div class="mode-selection">
        <button id="m_bot" class="btn-main active" onclick="setLocalMode('bot')">BOT</button>
        <button id="m_pvp" class="btn-main" onclick="setLocalMode('pvp')">2 KİŞİ</button>
        <button id="m_online" class="btn-main" onclick="toggleRoomModal(true)">ONLINE</button>
    </div>

    <div class="canvas-container">
        <canvas id="game" width="350" height="350"></canvas>
    </div>
