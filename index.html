<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum Plus</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        
        /* Skor Tablosu */
        .scoreboard { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 10px; z-index: 10; }
        .score-box { flex: 1; background: var(--card); border: 2px solid #222; padding: 10px; border-radius: 12px; text-align: center; }
        .score-box.active { border-color: var(--orange); }
        .score-box h2 { margin: 0; font-size: 1.4rem; color: var(--orange); }

        /* Oyun Kontrolleri - Tıklama Alanı Genişletildi */
        .controls { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 10px; z-index: 20; }
        .btn-act { flex: 1; padding: 15px; border: 2px solid #333; border-radius: 10px; font-weight: bold; background: #1a1a1a; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-act.active { background: var(--orange); color: black; border-color: var(--orange); }

        canvas { border: 3px solid #222; border-radius: 15px; background: #000; max-width: 100%; height: auto; touch-action: none; z-index: 5; }
        
        /* Menü Katmanı - En Üstte */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .menu-box { background: #000; border: 2px solid var(--orange); padding: 30px; border-radius: 20px; width: 280px; text-align: center; }
        .btn-menu { width: 100%; padding: 15px; margin: 8px 0; background: var(--orange); border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <div class="menu-box">
            <h2 style="color:var(--orange); margin-bottom: 20px;">MOD SEÇİN</h2>
            <button class="btn-menu" onclick="startGame('easy')">KOLAY BOT</button>
            <button class="btn-menu" onclick="startGame('normal')">NORMAL BOT</button>
            <button class="btn-menu" onclick="startGame('hard')">ZOR BOT</button>
            <button class="btn-menu" style="background:#222; color:white; margin-top: 15px;" onclick="alert('Online yakında!')">ONLINE OYNA</button>
        </div>
    </div>

    <div class="scoreboard">
        <div id="card0" class="score-box active"><span>OYUNCU</span><h2 id="w0">10</h2></div>
        <div id="card1" class="score-box"><span>RAKİP</span><h2 id="w1">10</h2></div>
    </div>

    <div class="controls">
        <button id="m-btn" class="btn-act active" onclick="setMode('move')">YÜRÜ</button>
        <button id="b-btn" class="btn-act" onclick="setMode('wall')">BARİKAT</button>
    </div>

    <canvas id="game" width="350" height="350"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const CELL = 50;
        let mode = 'move';
        let state = { turn: 0, walls: [], players: [{x:3, y:6, w:10, c:'#ff4757'}, {x:3, y:0, w:10, c:'#2e86de'}], over: false };

        function setMode(m) {
            mode = m;
            document.getElementById('m-btn').className = m === 'move' ? 'btn-act active' : 'btn-act';
            document.getElementById('b-btn').className = m === 'wall' ? 'btn-act active' : 'btn-act';
        }

        function startGame(diff) {
            document.getElementById('main-menu').style.display = 'none';
            // Zorluğa göre duvar sayısı ayarı
            state.players[1].w = diff === 'hard' ? 15 : (diff === 'easy' ? 5 : 10);
            draw();
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,350,350);
            ctx.strokeStyle = '#222';
            for(let i=0; i<7; i++) for(let j=0; j<7; j++) ctx.strokeRect(i*CELL, j*CELL, CELL, CELL);
            
            // Barikatları Çiz
            state.walls.forEach(w => {
                ctx.fillStyle = '#ff8c00';
                ctx.fillRect(w.x*CELL+5, w.y*CELL+45, 40, 10);
            });

            state.players.forEach((p, i) => {
                ctx.beginPath(); ctx.arc(p.x*CELL+25, p.y*CELL+25, 18, 0, Math.PI*2);
                ctx.fillStyle = p.c; ctx.fill();
                if(state.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
            });
            document.getElementById('w0').innerText = state.players[0].w;
            document.getElementById('w1').innerText = state.players[1].w;
        }

        canvas.onclick = (e) => {
            if(state.turn !== 0 || state.over) return;
            const r = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - r.left) / (r.width / 7));
            const y = Math.floor((e.clientY - r.top) / (r.height / 7));

            if(mode === 'move') {
                let p = state.players[0];
                if(Math.abs(x - p.x) + Math.abs(y - p.y) === 1) {
                    p.x = x; p.y = y;
                    state.turn = 1; draw(); setTimeout(botAction, 600);
                }
            } else if(state.players[0].w > 0) {
                state.walls.push({x, y});
                state.players[0].w--;
                state.turn = 1; draw(); setTimeout(botAction, 600);
            }
        };

        function botAction() {
            let b = state.players[1];
            if(b.y < 6) b.y++;
            state.turn = 0; draw();
        }
    </script>
</body>
</html>
