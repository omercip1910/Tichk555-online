<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barricade Platinum - Full Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --orange: #ff8c00; --bg: #030303; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        .id-badge { background: #0a0a0a; border: 1px solid #222; padding: 8px 15px; border-radius: 10px; margin-bottom: 15px; border-bottom: 3px solid var(--orange); text-align: center; }
        .game-title { color: var(--orange); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; }

        .scoreboard { display: flex; gap: 10px; margin: 15px 0; width: 330px; }
        .score-card { flex: 1; background: var(--card); border: 2px solid #222; border-radius: 12px; padding: 10px; text-align: center; transition: 0.3s; }
        .score-card.active { border-color: var(--orange); box-shadow: 0 0 10px rgba(255,140,0,0.3); }
        .score-card .val { font-size: 1.5rem; font-weight: 900; color: var(--orange); }

        .controls { display: flex; gap: 8px; width: 330px; margin-bottom: 10px; }
        .btn-act { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-act.active { background: var(--orange); color: #000; border-color: var(--orange); }

        .canvas-area { position: relative; border: 3px solid #1a1a1a; border-radius: 15px; background: #000; }
        canvas { border-radius: 12px; touch-action: none; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: #000; border: 2px solid var(--orange); border-radius: 20px; width: 280px; padding: 25px; text-align: center; }
        .modal-btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: var(--orange); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="id-badge">
        <div style="font-size: 0.6rem; color: var(--orange);">MY ID</div>
        <div id="my-id-display" style="font-weight: 900;">-----</div>
    </div>

    <div class="game-title">BARRICADE PLATINUM</div>

    <div class="scoreboard">
        <div id="card0" class="score-card active">
            <div style="font-size: 0.6rem;">OYUNCU 1</div>
            <div id="w0" class="val">10</div>
        </div>
        <div id="card1" class="score-card">
            <div style="font-size: 0.6rem;">OYUNCU 2</div>
            <div id="w1" class="val">10</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-move" class="btn-act active" onclick="setMode('move')">YÜRÜ</button>
        <button id="btn-wall" class="btn-act" onclick="setMode('wall')">BARİKAT</button>
    </div>

    <div class="canvas-area">
        <canvas id="game" width="350" height="350"></canvas>
    </div>

    <div id="room-info" style="margin-top: 10px; font-size: 0.7rem; color: #555;">ODA: ----</div>

    <div id="login-modal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color: var(--orange); margin-top:0;">BAŞLAT</h2>
            <button class="modal-btn" onclick="createRoom()">ODA KUR</button>
            <div style="margin: 10px 0; color: #333;">— VEYA —</div>
            <input type="text" id="join-input" placeholder="4 HANELİ KOD" maxlength="4">
            <button class="modal-btn" style="background:#222; color:#fff;" onclick="joinRoom()">ODAYA KATIL</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBdsGqK7JBt0Bg5w-w23mQsKrvBFOgtAGw",
        authDomain: "barricade-platinum-plus.firebaseapp.com",
        projectId: "barricade-platinum-plus",
        databaseURL: "https://barricade-platinum-plus-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const CELL = 50, GRID = 7;

    let myId = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('my-id-display').innerText = myId;

    let roomRef = null;
    let myRole = null; 
    let playMode = 'move';
    let state = {
        turn: 0, 
        walls: [], 
        players: [{x:3, y:6, w:10, c:'#ff4757', ty:0}, {x:3, y:0, w:10, c:'#2e86de', ty:6}],
        status: "waiting"
    };

    function setMode(m) {
        if(state.turn !== myRole) return;
        playMode = m;
        document.getElementById('btn-move').classList.toggle('active', m === 'move');
        document.getElementById('btn-wall').classList.toggle('active', m === 'wall');
    }

    // --- KURAL 1: DUVAR KONTROLÜ (HAREKET) ---
    function isMoveBlocked(x1, y1, x2, y2) {
        return state.walls.some(w => {
            if (w.t === 'h') {
                return (y1 === w.y && y2 === w.y + 1 || y1 === w.y + 1 && y2 === w.y) && x1 === w.x;
            } else {
                return (x1 === w.x && x2 === w.x + 1 || x1 === w.x + 1 && x2 === w.x) && y1 === w.y;
            }
        });
    }

    // --- KURAL 2: YOL KONTROLÜ (BFS ALGORİTMASI) ---
    function hasPath(playerIdx, tempWalls) {
        const p = state.players[playerIdx];
        const targetY = p.ty;
        let queue = [{x: p.x, y: p.y}];
        let visited = new Set();
        visited.add(`${p.x},${p.y}`);

        while(queue.length > 0) {
            let curr = queue.shift();
            if(curr.y === targetY) return true;

            const neighbors = [
                {x: curr.x, y: curr.y-1}, {x: curr.x, y: curr.y+1},
                {x: curr.x-1, y: curr.y}, {x: curr.x+1, y: curr.y}
            ];

            for(let n of neighbors) {
                if(n.x >= 0 && n.x < GRID && n.y >= 0 && n.y < GRID) {
                    if(!visited.has(`${n.x},${n.y}`)) {
                        // Geçici duvarları kontrol et
                        const blocked = tempWalls.some(w => {
                            if (w.t === 'h') return (curr.y === w.y && n.y === w.y + 1 || curr.y === w.y + 1 && n.y === w.y) && curr.x === w.x;
                            else return (curr.x === w.x && n.x === w.x + 1 || curr.x === w.x + 1 && n.x === w.x) && curr.y === w.y;
                        });
                        if(!blocked) {
                            visited.add(`${n.x},${n.y}`);
                            queue.push(n);
                        }
                    }
                }
            }
        }
        return false;
    }

    // --- OYUN FONKSİYONLARI ---
    function createRoom() {
        const code = Math.floor(1000 + Math.random() * 9000).toString();
        myRole = 0;
        roomRef = db.ref('rooms/' + code);
        roomRef.set({ state, status: "waiting", p1: myId });
        startSync(code);
    }

    function joinRoom() {
        const code = document.getElementById('join-input').value.trim();
        roomRef = db.ref('rooms/' + code);
        roomRef.once('value', s => {
            if(!s.exists()) return alert("Oda yok!");
            myRole = 1;
            roomRef.update({ status: "playing", p2: myId });
            startSync(code);
        });
    }

    function startSync(code) {
        document.getElementById('login-modal').style.display = 'none';
        document.getElementById('room-info').innerText = "ODA KODU: " + code;
        roomRef.on('value', s => {
            const data = s.val();
            if(!data) return;
            state = data.state;
            state.status = data.status;
            updateUI();
            draw();
        });
    }

    function updateUI() {
        document.getElementById('w0').innerText = state.players[0].w;
        document.getElementById('w1').innerText = state.players[1].w;
        document.getElementById('card0').classList.toggle('active', state.turn === 0);
        document.getElementById('card1').classList.toggle('active', state.turn === 1);
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,350,350);
        ctx.strokeStyle = '#1a1a1a';
        for(let i=0; i<GRID; i++) for(let j=0; j<GRID; j++) ctx.strokeRect(i*CELL, j*CELL, CELL, CELL);

        state.walls.forEach(w => {
            ctx.fillStyle = '#ff8c00';
            if(w.t === 'v') ctx.fillRect((w.x+1)*CELL-4, w.y*CELL+5, 8, CELL-10);
            else ctx.fillRect(w.x*CELL+5, (w.y+1)*CELL-4, CELL-10, 8);
        });

        state.players.forEach((p, i) => {
            ctx.beginPath(); ctx.arc(p.x*CELL+25, p.y*CELL+25, 18, 0, Math.PI*2);
            ctx.fillStyle = p.c; ctx.fill();
            if(state.turn === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); }
        });
    }

    canvas.onclick = (e) => {
        if(state.turn !== myRole || state.status !== "playing") return;
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX - r.left) * (350/r.width);
        const y = (e.clientY - r.top) * (350/r.height);
        const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);

        if(playMode === 'move') {
            let p = state.players[myRole];
            if(Math.abs(cx - p.x) + Math.abs(cy - p.y) === 1) {
                if(!isMoveBlocked(p.x, p.y, cx, cy)) {
                    p.x = cx; p.y = cy;
                    if(p.y
